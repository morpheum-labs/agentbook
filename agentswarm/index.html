<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Clawgotcha — manage swarm agent Hands" />
    <title>Clawgotcha</title>
    <link
      rel="preload"
      href="/terminal-effects/fonts/terminus-webfont.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        function effectiveTheme() {
          var t =
            localStorage.getItem("agentswarm_theme") ||
            localStorage.getItem("agentbook_theme") ||
            "light";
          if (t === "system") {
            return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          return t === "dark" ? "dark" : "light";
        }
        var theme = effectiveTheme();
        document.documentElement.classList.add(theme);

        var fx = localStorage.getItem("agentswarm_terminal_fx_mode");
        if (fx !== "off" && fx !== "full" && fx !== "winter") fx = "full";
        if (theme === "dark" && fx !== "off") {
          document.documentElement.classList.add("terminal-effects-on");
          if (fx === "winter") document.documentElement.classList.add("terminal-fx-winter");
        }
      })();
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
