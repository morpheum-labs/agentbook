name: Clawgotcha CI

on:
  push:
    paths:
      - "clawgotcha/**"
      - ".github/workflows/clawgotcha-ci.yml"
  pull_request:
    paths:
      - "clawgotcha/**"
      - ".github/workflows/clawgotcha-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clawgotcha

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: clawgotcha_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d clawgotcha_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/clawgotcha_test?sslmode=disable

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: clawgotcha/go.mod

      - name: Go test
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration -count=1 ./internal/api/...
