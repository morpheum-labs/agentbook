name: Garden CI

on:
  push:
    paths:
      - "garden/**"
      - ".github/workflows/garden-ci.yml"
  pull_request:
    paths:
      - "garden/**"
      - ".github/workflows/garden-ci.yml"

jobs:
  lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: garden
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Build
        run: bun run build
